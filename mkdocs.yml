      - Mongolia | モンゴル: countries/mongolia.md
      - Uzbekistan | ウズベキスタン: countries/uzbekistan.md
      - Kazakhstan | カザフスタン: countries/kazakhstan.md
      - Georgia | ジョージア: countries/georgia.md
      - Palau | パラオ: countries/palau.md
