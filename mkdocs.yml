  - Sources | 収集ソース: _sources.md

plugins:
  - search:
      lang:
        - ja
        - en

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - attr_list
  - footnotes
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.tilde
