site_name: Article 6.2 Policy Wiki
site_description: Paris Agreement Article 6.2 Policy Tracker | パリ協定 Article 6.2 政策状況トラッキングWiki

docs_dir: wiki

theme:
  name: material
  language: en
  palette:
    scheme: default
    primary: teal
    accent: green
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: 日本語
      link: /
      lang: ja

nav:
  - Home | ホーム: index.md
  - Matrix | マトリクス: matrix.md
  - Acquiring Parties | 調達国:
    - Japan | 日本: countries/japan.md
    - Singapore | シンガポール: countries/singapore.md
    - Switzerland | スイス: countries/switzerland.md
    - Sweden | スウェーデン: countries/sweden.md
    - Norway | ノルウェー: countries/norway.md
    - Korea | 韓国: countries/korea.md
    - CORSIA (International Aviation): buyers/corsia.md
    - IMO (International Shipping): buyers/imo.md
  - Host Countries | ホスト国:
    - Southeast Asia | 東南アジア:
      - Indonesia | インドネシア: countries/indonesia.md
      - Vietnam | ベトナム: countries/vietnam.md
